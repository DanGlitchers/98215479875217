<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מתנה לתהל 🎁</title>
    <!-- פונט מודרני מ-Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Rubik', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #1f1c2c 0%, #928dab 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #ffffff;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 28px;
            padding: 35px 25px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            transition: transform 0.4s ease, opacity 0.4s ease;
        }

        /* אנימציית מתנה קופצת */
        .gift-icon {
            font-size: 80px;
            margin-bottom: 20px;
            display: inline-block;
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-12px) scale(1.05); }
        }

        h1 {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 25px;
            line-height: 1.3;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .volume-box {
            background: rgba(255, 215, 0, 0.15);
            border: 1px dashed #ffd700;
            border-radius: 18px;
            padding: 14px 18px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            animation: pulse 1.8s infinite;
        }

        .volume-box span {
            font-size: 24px;
        }

        .volume-box p {
            font-size: 15px;
            font-weight: 600;
            color: #ffd700;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        .btn {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: #fff;
            border: none;
            padding: 18px 36px;
            font-size: 20px;
            font-weight: 800;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 10px 25px rgba(255, 65, 108, 0.4);
            transition: all 0.2s ease;
        }

        .btn:active {
            transform: scale(0.95);
            box-shadow: 0 5px 15px rgba(255, 65, 108, 0.4);
        }

        /* מסך שני - הפחדה / צחוק */
        .laugh-icon {
            font-size: 90px;
            margin-bottom: 20px;
            display: inline-block;
            animation: shake 0.5s infinite alternate ease-in-out;
        }

        @keyframes shake {
            0% { transform: rotate(-10deg) scale(1.1); }
            100% { transform: rotate(10deg) scale(1.1); }
        }

        .prank-title {
            font-size: 32px;
            font-weight: 900;
            color: #ff3366;
            text-shadow: 0 0 20px rgba(255, 51, 102, 0.6);
            line-height: 1.3;
        }

        .hidden {
            display: none !important;
        }

        /* נגן יוטיוב מוסתר */
        #youtube-player {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- מסך 1: ההודעה והבקשה להגביר -->
        <div id="step-1" class="card">
            <div class="gift-icon">🎁</div>
            <h1>היי תהל, זה מתנה ממני אלייך (:</h1>
            
            <div class="volume-box">
                <span>🔊</span>
                <p>תגבירי חזק את הטלפון לפני שאת לוחצת!</p>
            </div>

            <button id="gift-btn" class="btn">לקבל את המתנה ✨</button>
        </div>

        <!-- מסך 2: ההפתעה והשיר -->
        <div id="step-2" class="card hidden">
            <div class="laugh-icon">🤪</div>
            <h2 class="prank-title">חחחח הבהלתי אותך (:</h2>
        </div>
    </div>

    <!-- נגן יוטיוב מוסתר ברקע -->
    <div id="youtube-player"></div>

    <!-- טעינת ה-API של יוטיוב -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;

        // הגדרת הנגן ברגע שה-API מוכן
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '1',
                width: '1',
                videoId: 'ni21uQ0gy5k',
                playerVars: {
                    'autoplay': 0,
                    'controls': 0,
                    'playsinline': 1
                }
            });
        }

        // לחיצה על הכפתור
        document.getElementById('gift-btn').addEventListener('click', function() {
            // ניגון השיר
            if (player && typeof player.playVideo === 'function') {
                player.playVideo();
            }

            // החלפת המסכים
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');
        });
    </script>
</body>
</html>
